name: PrintGuard
version: 0.3.0
slug: printguard
description: MJPEG to MQTT print monitoring service
url: https://github.com/Meightem/PrintGuard
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
image: ghcr.io/meightem/printguard
options:
  mjpeg_url: ''
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_topic_prefix: printguard
  mqtt_discovery_prefix: homeassistant
  mqtt_username: ''
  mqtt_password: ''
  device_id: printguard-mjpeg-1
  device_name: PrintGuard MJPEG
  detection_interval_ms: 1000
  stream_open_timeout_ms: 5000
  stream_retry_delay_ms: 5000
  mqtt_retry_delay_ms: 5000
  log_level: INFO
schema:
  mjpeg_url: str
  mqtt_host: str
  mqtt_port: port
  mqtt_topic_prefix: str
  mqtt_discovery_prefix: str
  mqtt_username: str?
  mqtt_password: password?
  device_id: str
  device_name: str
  detection_interval_ms: int
  stream_open_timeout_ms: int
  stream_retry_delay_ms: int
  mqtt_retry_delay_ms: int
  log_level: str
