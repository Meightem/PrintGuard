name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: python -m py_compile printguard/*.py scripts/download_model.py

      - name: Verify add-on options loading
        run: |
          python - <<'PY'
          import json
          import os
          import tempfile

          from printguard.config import Settings

          with tempfile.NamedTemporaryFile("w", suffix=".json", delete=False) as handle:
              json.dump(
                  {
                      "mjpeg_url": "http://camera/stream",
                      "mqtt_host": "core-mosquitto",
                      "mqtt_port": 1883,
                      "log_level": "DEBUG",
                      "enabled": False,
                  },
                  handle,
              )
              options_path = handle.name

          os.environ["ADDON_OPTIONS_PATH"] = options_path
          settings = Settings.from_env()
          assert settings.mjpeg_url == "http://camera/stream"
          assert settings.mqtt_host == "core-mosquitto"
          assert settings.mqtt_port == 1883
          assert settings.log_level == "DEBUG"
          assert settings.enabled is False
          os.unlink(options_path)
          PY

      - name: Validate release metadata files
        run: |
          python - <<'PY'
          import json

          with open('release-please-config.json', 'r', encoding='utf-8') as handle:
              json.load(handle)
          with open('.release-please-manifest.json', 'r', encoding='utf-8') as handle:
              json.load(handle)
          PY

  build-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t printguard:test .
